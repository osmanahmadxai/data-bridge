# Full, self-contained Syncle stack: web GUI + API + Postgres + Redis.
# Everything runs in containers — a fresh machine needs only Docker.
#
#   syncle up          # build + start everything, open the GUI
#   docker compose -f docker-compose.app.yml up -d --build   # (equivalent)
#
# For local development against host-run services, use docker-compose.yml
# (Postgres + Redis only) plus `pnpm dev` instead.
name: syncle

services:
  postgres:
    image: postgres:16-alpine
    container_name: syncle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: syncle
    volumes:
      - syncle-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d syncle']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: syncle-redis
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--appendonly', 'yes']
    volumes:
      - syncle-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: syncle-app:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncle-api
    restart: unless-stopped
    working_dir: /app/apps/api
    # Apply DB migrations, then start the API.
    command: ['sh', '-c', 'npx prisma migrate deploy && node dist/main.js']
    environment:
      NODE_ENV: production
      PORT: '4002'
      WEB_ORIGIN: http://localhost:3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/syncle?schema=public
      REDIS_URL: redis://redis:6379
      # Persist the generated master key + local state in a named volume so
      # stored credentials and sessions survive restarts.
      SYNCLE_DATA_DIR: /app/apps/api/.syncle
    volumes:
      - syncle-api-data:/app/apps/api/.syncle
    ports:
      - '4002:4002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: syncle-app:local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syncle-web
    restart: unless-stopped
    working_dir: /app/apps/web
    command: ['node', 'scripts/next-with-port.mjs', 'start']
    environment:
      NODE_ENV: production
      WEB_PORT: '3002'
    ports:
      - '3002:3002'
    depends_on:
      - api

volumes:
  syncle-postgres-data:
  syncle-redis-data:
  syncle-api-data:
